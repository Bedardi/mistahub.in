name: Build and Upload YouTube Short

on:
  schedule:
    - cron: '0 * * * *' # Har 1 ghante mein chalega (aap apne hisaab se change kar sakte hain)
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. YEH STEP SABSE PEHLE HONA ZAROORI HAI (Yeh repo ki files ko download karta hai)
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Python Setup
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      # 3. Dependencies Install Karein
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Main Python Script Run Karein
      - name: Run Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
        run: |
          python yt.py  # (Yahan apni python file ka sahi naam likhein agar alag hai)
