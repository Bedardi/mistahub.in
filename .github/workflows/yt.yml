name: Build and Upload YouTube Short

on:
  schedule:
    - cron: '0 * * * *' # Ya jo bhi aapka schedule ho
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. Yeh step sabse pehle hona chahiye jo repo ki files ko download karega
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Python Setup
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          # Agar requirements.txt nahi rakhna toh 'cache: pip' yahan se hata sakte hain
          cache: 'pip' 

      # 3. Dependencies Install Karein
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pillow moviepy google-api-python-client google-auth-httplib2 google-auth-oauthlib

      # 4. Main Script Run Karein
      - name: Run Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
        run: |
          python main.py
