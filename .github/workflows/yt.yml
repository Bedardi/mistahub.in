name: YouTube Short Automation

on:
  schedule:
    # Din mein 2 baar chalega (Best Indian Peak Times)
    # UTC Times: 08:00, 13:00 
    # IST Times (India): 1:30 PM aur 6:30 PM
    - cron: '0 8,13 * * *' 
  workflow_dispatch: # Manual run ke liye

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      # FIX: MoviePy TextClip ke liye ImageMagick Policy
      - name: Setup ImageMagick for MoviePy Text
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick
          sudo sed -i '/<policy domain="path" rights="none" pattern="@\*"/d' /etc/ImageMagick-6/policy.xml

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
        run: |
          python yt.py
