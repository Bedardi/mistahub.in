name: Generate & Upload YouTube Short

on:
  workflow_dispatch:  
  schedule:
    - cron: '30 0 * * *'   
    - cron: '0 6 * * *'    
    - cron: '30 10 * * *'  

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # 🚀 YE HAI GAME CHANGER: Agli baar se installation seconds me hogi!

      - name: Install System Dependencies (Lite)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python Dependencies (Optimized)
        # 🗑️ Removed pytrends aur extra heavy stuff
        run: |
          pip install edge-tts moviepy==1.0.3 requests Pillow==9.5.0 "imageio[pyav]" imageio-ffmpeg google-api-python-client google-auth-httplib2 google-auth-oauthlib google-generativeai numpy

      - name: Run Video Generator & Auto-Upload Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
        run: python main.py

      - name: Clean Up Everything
        run: |
          rm -f *.mp4 *.mp3 *.jpg *.png HindiFont.ttf
